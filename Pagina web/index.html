<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestor de Tareas</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
}

/* LAYOUT PRINCIPAL */
.app {
  display: flex;
  width: 100%;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: linear-gradient(180deg, #667eea, #764ba2);
  color: white;
  padding: 20px;
}

.sidebar h1 {
  margin-top: 0;
}

.filter {
  margin-top: 30px;
}

.filter button {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  text-align: left;
  transition: 0.3s;
}

.filter button.active {
  background: white;
  color: #667eea;
  font-weight: bold;
}

/* CONTENIDO */
.main {
  flex: 1;
  padding: 30px;
  background: #f4f6f9;
  overflow-y: auto;
}

/* INPUT */
.task-input {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.task-input input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* PRIORIDADES */
.priority-selector {
  display: flex;
  gap: 5px;
}

.priority-btn {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  opacity: 0.6;
}

.priority-btn.active {
  opacity: 1;
  transform: scale(1.1);
}

.p1 { background: #28a745; }
.p2 { background: #6fbd44; }
.p3 { background: #ffc107; color: black; }
.p4 { background: #fd7e14; }
.p5 { background: #dc3545; }

.add-btn {
  background: #667eea;
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* LISTA */
.task {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task.completed {
  opacity: 0.6;
  text-decoration: line-through;
  background: #d4edda;
}

.priority-label {
  padding: 4px 8px;
  border-radius: 6px;
  color: white;
  margin-left: 10px;
  font-size: 12px;
}

.actions button {
  border: none;
  padding: 6px 10px;
  margin-left: 5px;
  border-radius: 6px;
  cursor: pointer;
  color: white;
}

.complete-btn { background: #17a2b8; }
.delete-btn { background: #dc3545; }

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>Tareas</h1>

    <div class="filter">
      <button id="filter-all" class="active" onclick="setFilter('all')">Todas</button>
      <button id="filter-pending" onclick="setFilter('pending')">Pendientes</button>
      <button id="filter-completed" onclick="setFilter('completed')">Completadas</button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="main">

    <div class="task-input">
      <input type="text" id="taskText" placeholder="Nueva tarea...">

      <div class="priority-selector">
        <button class="priority-btn p1" onclick="setPriority(1)">1</button>
        <button class="priority-btn p2" onclick="setPriority(2)">2</button>
        <button class="priority-btn p3" onclick="setPriority(3)">3</button>
        <button class="priority-btn p4" onclick="setPriority(4)">4</button>
        <button class="priority-btn p5 active" onclick="setPriority(5)">5</button>
      </div>

      <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <div id="taskList"></div>

  </div>

</div>

<script>
let tasks = [];
let currentFilter = 'all';
let currentPriority = 5;

function setPriority(p) {
  currentPriority = p;
  document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.p' + p).classList.add('active');
}

function addTask() {
  const text = document.getElementById('taskText').value;
  if (text.trim() === '') return;

  tasks.push({
    text,
    priority: currentPriority,
    completed: false
  });

  document.getElementById('taskText').value = '';
  renderTasks();
}

function toggleTask(index) {
  tasks[index].completed = !tasks[index].completed;
  renderTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  renderTasks();
}

function setFilter(filter) {
  currentFilter = filter;

  document.querySelectorAll('.filter button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('filter-' + filter).classList.add('active');

  renderTasks();
}

function getPriorityColor(priority) {
  const colors = {
    1: '#28a745',
    2: '#6fbd44',
    3: '#ffc107',
    4: '#fd7e14',
    5: '#dc3545'
  };
  return colors[priority];
}

function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  let filtered = tasks.filter(task => {
    if (currentFilter === 'pending') return !task.completed;
    if (currentFilter === 'completed') return task.completed;
    return true;
  });

  filtered.forEach((task, index) => {
    const div = document.createElement('div');
    div.className = 'task' + (task.completed ? ' completed' : '');

    div.innerHTML = `
      <div>
        ${task.text}
        <span class="priority-label" style="background:${getPriorityColor(task.priority)}">
          P${task.priority}
        </span>
      </div>

      <div class="actions">
        <button class="complete-btn" onclick="toggleTask(${index})">✓</button>
        <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
      </div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
