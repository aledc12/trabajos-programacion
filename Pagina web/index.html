<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Tareas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Encabezado -->
    <header class="header">
      <div>
        <h1>Gestor de tareas</h1>
        <p class="subtitle">Organiza tu día con calma y claridad</p>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </header>

    <div class="layout">
      <!-- Sidebar: formulario -->
      <aside class="sidebar">
        <div class="card">
          <h2>Nueva tarea</h2>
          <form id="taskForm" class="form">
            <label for="taskInput">Tarea</label>
            <input
              id="taskInput"
              type="text"
              placeholder="Ej. Estudiar matemáticas"
              required
            />

            <label for="priorityInput">Prioridad (1 = alta, 5 = baja)</label>
            <select id="priorityInput">
              <option value="1">1 — Muy alta</option>
              <option value="2">2 — Alta</option>
              <option value="3" selected>3 — Media</option>
              <option value="4">4 — Baja</option>
              <option value="5">5 — Muy baja</option>
            </select>

            <button type="submit" class="btn btn-primary">Añadir tarea</button>
          </form>
        </div>
      </aside>

      <!-- Main: filtros + lista -->
      <main class="main">
        <div class="filters">
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Completadas</button>
            <button class="filter-btn" data-filter="all">Todas</button>
          </div>
          <span id="counter" class="counter">0 tareas</span>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <p id="emptyState" class="empty-state">No hay tareas para mostrar.</p>
      </main>
    </div>
  </div>

  <script>
    const form = document.getElementById('taskForm');
    const input = document.getElementById('taskInput');
    const priorityInput = document.getElementById('priorityInput');
    const taskList = document.getElementById('taskList');
    const counter = document.getElementById('counter');
    const emptyState = document.getElementById('emptyState');
    const themeToggle = document.getElementById('themeToggle');
    const filterButtons = document.querySelectorAll('.filter-btn');

    let tasks = [];
    let currentFilter = 'pending';

    // Tema
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });

    // Filtros
    filterButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        filterButtons.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // Añadir tarea
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({
        id: Date.now(),
        text,
        priority: Number(priorityInput.value),
        completed: false,
      });
      input.value = '';
      priorityInput.value = '3';
      render();
    });

    function toggleTask(id) {
      tasks = tasks.map((t) =>
        t.id === id ? { ...t, completed: !t.completed } : t
      );
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter((t) => t.id !== id);
      render();
    }

    function getFiltered() {
      if (currentFilter === 'pending') return tasks.filter((t) => !t.completed);
      if (currentFilter === 'completed') return tasks.filter((t) => t.completed);
      return tasks;
    }

    function render() {
      const filtered = getFiltered();
      taskList.innerHTML = '';

      filtered.forEach((task) => {
        const li = document.createElement('li');
        li.className = 'task' + (task.completed ? ' completed' : '');
        li.dataset.priority = task.priority;

        li.innerHTML = `
          <button class="check" aria-label="Completar">
            ${task.completed ? '✓' : ''}
          </button>
          <div class="task-content">
            <span class="task-text">${escapeHtml(task.text)}</span>
            <span class="badge">P${task.priority}</span>
          </div>
          <button class="delete" aria-label="Eliminar">✕</button>
        `;

        li.querySelector('.check').addEventListener('click', () => toggleTask(task.id));
        li.querySelector('.delete').addEventListener('click', () => deleteTask(task.id));
        taskList.appendChild(li);
      });

      counter.textContent =
        filtered.length === 1 ? '1 tarea' : `${filtered.length} tareas`;
      emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    render();
  </script>
</body>
</html>
