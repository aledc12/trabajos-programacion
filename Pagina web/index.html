<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Tareas</title>

  <!-- Enlace al CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>Tareas</h1>

    <div class="filter">
      <button id="filter-all" class="active" onclick="setFilter('all')">Todas</button>
      <button id="filter-pending" onclick="setFilter('pending')">Pendientes</button>
      <button id="filter-completed" onclick="setFilter('completed')">Completadas</button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="main">

    <div class="task-input">
      <input type="text" id="taskText" placeholder="Nueva tarea...">

      <div class="priority-selector">
        <button class="priority-btn p1" onclick="setPriority(1)">1</button>
        <button class="priority-btn p2" onclick="setPriority(2)">2</button>
        <button class="priority-btn p3" onclick="setPriority(3)">3</button>
        <button class="priority-btn p4" onclick="setPriority(4)">4</button>
        <button class="priority-btn p5 active" onclick="setPriority(5)">5</button>
      </div>

      <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <div id="taskList"></div>

  </div>

</div>

<script>
let tasks = [];
let currentFilter = 'all';
let currentPriority = 5;

function setPriority(p) {
  currentPriority = p;
  document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.p' + p).classList.add('active');
}

function addTask() {
  const text = document.getElementById('taskText').value;
  if (text.trim() === '') return;

  tasks.push({
    text,
    priority: currentPriority,
    completed: false
  });

  document.getElementById('taskText').value = '';
  renderTasks();
}

function toggleTask(index) {
  tasks[index].completed = !tasks[index].completed;
  renderTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  renderTasks();
}

function setFilter(filter) {
  currentFilter = filter;

  document.querySelectorAll('.filter button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('filter-' + filter).classList.add('active');

  renderTasks();
}

function getPriorityColor(priority) {
  const colors = {
    1: '#28a745',
    2: '#6fbd44',
    3: '#ffc107',
    4: '#fd7e14',
    5: '#dc3545'
  };
  return colors[priority];
}

function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  let filtered = tasks.filter(task => {
    if (currentFilter === 'pending') return !task.completed;
    if (currentFilter === 'completed') return task.completed;
    return true;
  });

  filtered.forEach((task, index) => {
    const div = document.createElement('div');
    div.className = 'task' + (task.completed ? ' completed' : '');

    div.innerHTML = `
      <div>
        ${task.text}
        <span class="priority-label" style="background:${getPriorityColor(task.priority)}">
          P${task.priority}
        </span>
      </div>

      <div class="actions">
        <button class="complete-btn" onclick="toggleTask(${index})">✓</button>
        <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
      </div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
